<header class="site-header">
    <div class="header-container">
        <!-- Navigation Left -->
        <nav class="header-nav-left">
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/accommodations">Accommodations</a></li>
                <li><a href="/sustainability">Sustainability</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </nav>

        <!-- Center Logo -->
        <a href="/" class="header-logo-link">
            <!-- Full path to themed assets to ensure resolution in the block-based HTML part -->
            <img src="/wp-content/themes/child-aura-solis-retreat/assets/images/logo.webp" alt="Aura Solis Retreat" class="header-logo">
        </a>

        <!-- Actions Right -->
        <div class="header-actions">
            <button class="header-search-btn" aria-label="Search">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <a href="/book" class="btn-gold header-book-btn">BOOK NOW</a>
        </div>
        <!-- Hamburger Menu Button (Tablet/Mobile) -->
        <button class="header-hamburger" aria-label="Toggle Menu">
            <svg class="hamburger-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
    </div>

    <!-- Mobile Menu Drawer -->
    <div class="mobile-drawer-overlay"></div>
    <div class="mobile-drawer">
        <!-- Close Button -->
        <button class="mobile-drawer-close" aria-label="Close Menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        <nav class="mobile-drawer-nav">
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/accommodations">Accommodations</a></li>
                <li><a href="/sustainability">Sustainability</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </nav>
        <div class="mobile-drawer-actions">
            <div class="mobile-search-field">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" placeholder="Search..." class="mobile-search-input">
            </div>
            <a href="/book" class="btn-gold mobile-book-btn">BOOK NOW</a>
        </div>
    </div>
</header>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const header = document.querySelector(".site-header");
        if (header) {
            window.addEventListener("scroll", function () {
                // When scrolled more than 50px, add the dark background class
                if (window.scrollY > 50) {
                    header.classList.add("header-scrolled");
                } else {
                    header.classList.remove("header-scrolled");
                }
            });

            // Hamburger Menu Logic
            const hamburger = document.querySelector(".header-hamburger");
            const overlay = document.querySelector(".mobile-drawer-overlay");
            const closeBtn = document.querySelector(".mobile-drawer-close");

            function closeMenu() {
                document.body.classList.remove("menu-open");
            }

            if (hamburger) {
                hamburger.addEventListener("click", function () {
                    document.body.classList.toggle("menu-open");
                });
            }
            
            if (overlay) {
                overlay.addEventListener("click", closeMenu);
            }

            if (closeBtn) {
                closeBtn.addEventListener("click", closeMenu);
            }
        }
    });
</script>
